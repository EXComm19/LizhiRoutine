<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!--
    Lizhi Routine favicon. Next 15+ auto-serves this at /icon.svg and
    injects the <link rel="icon"> tag. prefers-color-scheme inverts the
    palette so it stays legible in browser dark mode (Safari + Firefox
    + Chrome 105+ all honour this for favicons).
  -->
  <style>
    .bg { fill: #1A170E; }
    .fg { fill: #F5EDD6; }
    .hl { fill: #ffffff; opacity: 0.22; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #F5EDD6; }
      .fg { fill: #14110A; }
      .hl { fill: #ffffff; opacity: 0.6; }
    }
  </style>
  <rect class="bg" width="100" height="100" rx="22"/>
  <rect class="fg" x="28" y="18" width="18" height="42" rx="4.5"/>
  <rect class="fg" x="28" y="63" width="44" height="16" rx="4.5"/>
  <rect class="hl" x="6" y="3" width="88" height="2" rx="1"/>
</svg>
